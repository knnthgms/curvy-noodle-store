<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A habit tracker grid with a ten badge">
  <defs>
    <pattern id="dots" width="38" height="38" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2.4" fill="#43382E" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#FFFBF4"/>
  <rect width="1200" height="675" fill="url(#dots)"/>
  <circle cx="1140" cy="620" r="200" fill="#FFE3D0" opacity="0.45"/>
  <circle cx="70" cy="110" r="130" fill="#DDE9D5" opacity="0.4"/>
  <g transform="rotate(-16 150 90)">
    <rect x="10" y="64" width="260" height="46" rx="6" fill="#FAD3E0" opacity="0.9"/>
    <path d="M30 87h220" stroke="#B02D63" stroke-width="3" stroke-dasharray="2 13" stroke-linecap="round" opacity="0.5"/>
  </g>
  <circle cx="1052" cy="135" r="20" fill="#FAD3E0"/>
  <circle cx="1100" cy="135" r="20" fill="#DDE9D5"/>
  <circle cx="1148" cy="135" r="20" fill="#FBE7A8"/>

  <!-- card -->
  <rect x="395" y="195" width="410" height="290" rx="24" fill="#FFFFFF" stroke="#F8EFDE" stroke-width="5"/>
  <rect x="430" y="228" width="150" height="20" rx="10" fill="#FAD3E0"/>
  <!-- 5 x 2 circles, some filled with checks -->
  <g>
    <circle cx="450" cy="320" r="22" fill="#DDE9D5"/>
    <circle cx="512" cy="320" r="22" fill="#DDE9D5"/>
    <circle cx="574" cy="320" r="22" fill="#FFFFFF" stroke="#E1D4C0" stroke-width="3"/>
    <circle cx="636" cy="320" r="22" fill="#DDE9D5"/>
    <circle cx="698" cy="320" r="22" fill="#FFFFFF" stroke="#E1D4C0" stroke-width="3"/>
    <circle cx="450" cy="392" r="22" fill="#FFFFFF" stroke="#E1D4C0" stroke-width="3"/>
    <circle cx="512" cy="392" r="22" fill="#DDE9D5"/>
    <circle cx="574" cy="392" r="22" fill="#DDE9D5"/>
    <circle cx="636" cy="392" r="22" fill="#FFFFFF" stroke="#E1D4C0" stroke-width="3"/>
    <circle cx="698" cy="392" r="22" fill="#DDE9D5"/>
  </g>
  <g stroke="#48663F" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M440 320 l7 8 13 -16"/>
    <path d="M502 320 l7 8 13 -16"/>
    <path d="M626 320 l7 8 13 -16"/>
    <path d="M502 392 l7 8 13 -16"/>
    <path d="M564 392 l7 8 13 -16"/>
    <path d="M688 392 l7 8 13 -16"/>
  </g>
  <!-- big "10" badge -->
  <circle cx="772" cy="222" r="50" fill="#B02D63"/>
  <text x="772" y="241" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="44" font-weight="bold" fill="#FFFFFF">10</text>

  <path d="M150 520 l9 24 24 9 -24 9 -9 24 -9 -24 -24 -9 24 -9 Z" fill="#FBE7A8"/>
</svg>
