    <path d="M400 330h110a55 55 0 0 1-110 0Z" fill="none" stroke="#9C8E7B" stroke-width="6"/>
    <path d="M412 320c6-16 16-12 20-26M440 318c5-15 14-11 17-25M468 320c5-14 13-10 16-23" stroke="#9C8E7B" stroke-width="5" stroke-linecap="round" fill="none"/>
