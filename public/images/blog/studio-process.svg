  <path d="M210 300c30-30 60 10 90-20M212 350c40-20 70 16 100-12M214 400c30-24 66 8 96-16" stroke="#B9AB97" stroke-width="7" stroke-linecap="round" fill="none" transform="rotate(-4 370 380)"/>
