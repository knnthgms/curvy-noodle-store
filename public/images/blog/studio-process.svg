    <circle cx="860" cy="280" r="46" fill="#FBE7A8"/>
    <path d="M840 280a20 20 0 1 0 40 0 20 20 0 0 0-40 0Z" fill="#F2A65A"/>
    <circle cx="730" cy="410" r="46" fill="#DDE9D5"/>
