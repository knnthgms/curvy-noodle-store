<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A sheet of cute stickers with one peeling off">
  <defs>
    <pattern id="dots" width="38" height="38" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2.4" fill="#43382E" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#FFFBF4"/>
  <rect width="1200" height="675" fill="url(#dots)"/>
  <circle cx="1140" cy="620" r="200" fill="#FFE3D0" opacity="0.45"/>
  <circle cx="70" cy="110" r="130" fill="#DDE9D5" opacity="0.4"/>
  <g transform="rotate(-16 150 90)">
    <rect x="10" y="64" width="260" height="46" rx="6" fill="#FAD3E0" opacity="0.9"/>
    <path d="M30 87h220" stroke="#B02D63" stroke-width="3" stroke-dasharray="2 13" stroke-linecap="round" opacity="0.5"/>
  </g>
  <circle cx="1052" cy="135" r="20" fill="#FAD3E0"/>
  <circle cx="1100" cy="135" r="20" fill="#DDE9D5"/>
  <circle cx="1148" cy="135" r="20" fill="#FBE7A8"/>

  <!-- sticker backing sheet -->
  <rect x="410" y="160" width="380" height="350" rx="22" fill="#FFFFFF" stroke="#F8EFDE" stroke-width="5"/>
  <!-- heart sticker -->
  <path d="M500 268c-22-20-44 4-22 24l22 20 22-20c22-20 0-44-22-24Z" fill="#FAD3E0" stroke="#FFFFFF" stroke-width="4"/>
  <!-- smiley sticker -->
  <g>
    <circle cx="600" cy="278" r="34" fill="#DDE9D5" stroke="#FFFFFF" stroke-width="4"/>
    <circle cx="589" cy="272" r="4" fill="#43382E"/><circle cx="611" cy="272" r="4" fill="#43382E"/>
    <path d="M589 288q11 9 22 0" stroke="#43382E" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
  <!-- star sticker -->
  <path d="M700 244 l9 26 27 0 -22 16 9 26 -23 -16 -23 16 9 -26 -22 -16 27 0 Z" fill="#FBE7A8" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round"/>
  <!-- flower sticker -->
  <g transform="translate(500 410)">
    <circle cx="0" cy="-18" r="12" fill="#FAD3E0"/><circle cx="17" cy="-6" r="12" fill="#FAD3E0"/><circle cx="11" cy="14" r="12" fill="#FAD3E0"/><circle cx="-11" cy="14" r="12" fill="#FAD3E0"/><circle cx="-17" cy="-6" r="12" fill="#FAD3E0"/>
    <circle cx="0" cy="-2" r="11" fill="#FBE7A8"/>
  </g>
  <!-- leaf sticker -->
  <path d="M600 392c34-8 56 14 48 48-34 8-56-14-48-48Z" fill="#DDE9D5" stroke="#FFFFFF" stroke-width="4"/>
  <path d="M608 432c14-12 26-18 34-22" stroke="#48663F" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- peeling sticker (top-right corner of sheet) -->
  <g transform="rotate(18 716 408)">
    <circle cx="716" cy="408" r="34" fill="#FFE3D0" stroke="#FFFFFF" stroke-width="4"/>
    <path d="M716 442a34 34 0 0 0 24-10l-13-8Z" fill="#E9C9AE"/>
    <circle cx="705" cy="402" r="4" fill="#43382E"/><circle cx="727" cy="402" r="4" fill="#43382E"/>
    <path d="M705 416q11 9 22 0" stroke="#43382E" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <path d="M150 520 l9 24 24 9 -24 9 -9 24 -9 -24 -24 -9 24 -9 Z" fill="#FBE7A8"/>
</svg>
