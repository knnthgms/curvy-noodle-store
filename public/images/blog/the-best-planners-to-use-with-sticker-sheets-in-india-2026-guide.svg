<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A stack of planners with a 2026 best-pick badge">
  <defs>
    <pattern id="dots" width="38" height="38" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2.4" fill="#43382E" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#FFFBF4"/>
  <rect width="1200" height="675" fill="url(#dots)"/>
  <circle cx="1140" cy="620" r="200" fill="#FFE3D0" opacity="0.45"/>
  <circle cx="70" cy="110" r="130" fill="#DDE9D5" opacity="0.4"/>
  <g transform="rotate(-16 150 90)">
    <rect x="10" y="64" width="260" height="46" rx="6" fill="#FAD3E0" opacity="0.9"/>
    <path d="M30 87h220" stroke="#B02D63" stroke-width="3" stroke-dasharray="2 13" stroke-linecap="round" opacity="0.5"/>
  </g>
  <circle cx="1052" cy="135" r="20" fill="#FAD3E0"/>
  <circle cx="1100" cy="135" r="20" fill="#DDE9D5"/>
  <circle cx="1148" cy="135" r="20" fill="#FBE7A8"/>

  <!-- stacked closed books (side view) -->
  <g transform="rotate(-3 590 430)">
    <rect x="420" y="408" width="340" height="64" rx="14" fill="#FFE3D0" stroke="#E3B48F" stroke-width="4"/>
    <rect x="432" y="420" width="10" height="40" rx="5" fill="#E3B48F"/>
  </g>
  <g transform="rotate(2 600 360)">
    <rect x="440" y="344" width="320" height="62" rx="14" fill="#DDE9D5" stroke="#A9C39B" stroke-width="4"/>
    <rect x="452" y="356" width="10" height="38" rx="5" fill="#A9C39B"/>
  </g>
  <g transform="rotate(-2 590 292)">
    <rect x="430" y="280" width="320" height="60" rx="14" fill="#FAD3E0" stroke="#E79BBA" stroke-width="4"/>
    <rect x="442" y="292" width="10" height="36" rx="5" fill="#E79BBA"/>
  </g>
  <!-- best-pick star badge -->
  <g transform="translate(720 250)">
    <path d="M0 -50 l13 30 33 3 -25 22 8 32 -29 -18 -29 18 8 -32 -25 -22 33 -3 Z" fill="#FBE7A8" stroke="#E9D08A" stroke-width="4" stroke-linejoin="round"/>
    <text x="0" y="6" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="bold" fill="#7C621A">2026</text>
  </g>

  <path d="M150 520 l9 24 24 9 -24 9 -9 24 -9 -24 -24 -9 24 -9 Z" fill="#FBE7A8"/>
</svg>
