<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A dot-grid bullet journal beside a lined daily planner">
  <defs>
    <pattern id="dots" width="38" height="38" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2.4" fill="#43382E" opacity="0.07"/>
    </pattern>
    <pattern id="bujodots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.7" fill="#9DBE90"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#FFFBF4"/>
  <rect width="1200" height="675" fill="url(#dots)"/>
  <circle cx="1140" cy="620" r="200" fill="#FFE3D0" opacity="0.45"/>
  <circle cx="70" cy="110" r="130" fill="#DDE9D5" opacity="0.4"/>
  <g transform="rotate(-16 150 90)">
    <rect x="10" y="64" width="260" height="46" rx="6" fill="#FAD3E0" opacity="0.9"/>
    <path d="M30 87h220" stroke="#B02D63" stroke-width="3" stroke-dasharray="2 13" stroke-linecap="round" opacity="0.5"/>
  </g>
  <circle cx="1052" cy="135" r="20" fill="#FAD3E0"/>
  <circle cx="1100" cy="135" r="20" fill="#DDE9D5"/>
  <circle cx="1148" cy="135" r="20" fill="#FBE7A8"/>

  <!-- left: bullet journal (dotted) -->
  <g transform="rotate(-4 470 340)">
    <rect x="350" y="190" width="240" height="310" rx="18" fill="#FFFFFF" stroke="#A9C39B" stroke-width="5"/>
    <rect x="350" y="190" width="34" height="310" rx="16" fill="#DDE9D5"/>
    <rect x="402" y="214" width="170" height="262" fill="url(#bujodots)"/>
  </g>
  <!-- right: daily planner (lined) -->
  <g transform="rotate(4 730 340)">
    <rect x="610" y="190" width="240" height="310" rx="18" fill="#FFFFFF" stroke="#E79BBA" stroke-width="5"/>
    <rect x="816" y="190" width="34" height="310" rx="16" fill="#FAD3E0"/>
    <rect x="636" y="220" width="150" height="18" rx="9" fill="#FAD3E0"/>
    <g stroke="#E9DBDE" stroke-width="6" stroke-linecap="round">
      <path d="M636 268h160M636 300h160M636 332h160M636 364h160M636 396h160M636 428h120"/>
    </g>
  </g>
  <!-- vs badge -->
  <circle cx="600" cy="350" r="44" fill="#FBE7A8" stroke="#FFFFFF" stroke-width="6"/>
  <text x="600" y="364" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="30" font-weight="bold" fill="#7C621A">vs</text>

  <path d="M150 540 l9 24 24 9 -24 9 -9 24 -9 -24 -24 -9 24 -9 Z" fill="#FBE7A8"/>
</svg>
