<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sticker bundles — a stack of sticker sheets">
  <defs>
    <pattern id="dots" width="38" height="38" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2.4" fill="#43382E" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#FFFBF4"/>
  <rect width="1200" height="675" fill="url(#dots)"/>
  <circle cx="1140" cy="620" r="200" fill="#FFE3D0" opacity="0.45"/>
  <circle cx="70" cy="110" r="130" fill="#DDE9D5" opacity="0.4"/>
  <g transform="rotate(-16 150 90)">
    <rect x="10" y="64" width="260" height="46" rx="6" fill="#FAD3E0" opacity="0.9"/>
    <path d="M30 87h220" stroke="#B02D63" stroke-width="3" stroke-dasharray="2 13" stroke-linecap="round" opacity="0.5"/>
  </g>
  <circle cx="1052" cy="135" r="20" fill="#FAD3E0"/>
  <circle cx="1100" cy="135" r="20" fill="#DDE9D5"/>
  <circle cx="1148" cy="135" r="20" fill="#FBE7A8"/>

  <!-- stacked sticker sheets -->
  <g transform="rotate(-8 600 340)">
    <rect x="430" y="210" width="300" height="290" rx="18" fill="#FFFFFF" stroke="#F0E6D4" stroke-width="5"/>
  </g>
  <g transform="rotate(5 600 340)">
    <rect x="470" y="195" width="300" height="290" rx="18" fill="#FFFFFF" stroke="#F0E6D4" stroke-width="5"/>
  </g>
  <!-- top sheet with mini stickers -->
  <g transform="rotate(-2 600 330)">
    <rect x="448" y="185" width="300" height="290" rx="18" fill="#FFFFFF" stroke="#F8EFDE" stroke-width="5"/>
    <!-- heart -->
    <path d="M527 268c-16-15-32 3-16 18l16 15 16-15c16-15 0-33-16-18Z" fill="#FAD3E0"/>
    <!-- smiley -->
    <g>
      <circle cx="660" cy="270" r="30" fill="#DDE9D5"/>
      <circle cx="650" cy="264" r="3.6" fill="#43382E"/><circle cx="670" cy="264" r="3.6" fill="#43382E"/>
      <path d="M650 280q10 8 20 0" stroke="#43382E" stroke-width="3.6" fill="none" stroke-linecap="round"/>
    </g>
    <!-- star -->
    <path d="M540 360 l7 20 21 0 -17 13 7 20 -18 -12 -18 12 7 -20 -17 -13 21 0 Z" fill="#FBE7A8"/>
    <!-- flower -->
    <g transform="translate(665 385)">
      <circle cx="0" cy="-15" r="11" fill="#FAD3E0"/><circle cx="14" cy="-5" r="11" fill="#FAD3E0"/><circle cx="9" cy="12" r="11" fill="#FAD3E0"/><circle cx="-9" cy="12" r="11" fill="#FAD3E0"/><circle cx="-14" cy="-5" r="11" fill="#FAD3E0"/>
      <circle cx="0" cy="-1" r="10" fill="#FBE7A8"/>
    </g>
  </g>

  <path d="M150 520 l9 24 24 9 -24 9 -9 24 -9 -24 -24 -9 24 -9 Z" fill="#FBE7A8"/>
</svg>
