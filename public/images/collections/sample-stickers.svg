<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sample sticker pack — a gift box with a few stickers peeking out and a Try Me tag">
  <defs>
    <pattern id="dots" width="38" height="38" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2.4" fill="#43382E" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#FFFBF4"/>
  <rect width="1200" height="675" fill="url(#dots)"/>
  <circle cx="1140" cy="620" r="200" fill="#FFE3D0" opacity="0.45"/>
  <circle cx="70" cy="110" r="130" fill="#DDE9D5" opacity="0.4"/>
  <g transform="rotate(-16 150 90)">
    <rect x="10" y="64" width="260" height="46" rx="6" fill="#FAD3E0" opacity="0.9"/>
    <path d="M30 87h220" stroke="#B02D63" stroke-width="3" stroke-dasharray="2 13" stroke-linecap="round" opacity="0.5"/>
  </g>
  <circle cx="1052" cy="135" r="20" fill="#FAD3E0"/>
  <circle cx="1100" cy="135" r="20" fill="#DDE9D5"/>
  <circle cx="1148" cy="135" r="20" fill="#FBE7A8"/>

  <!-- gift box -->
  <g>
    <!-- box body -->
    <rect x="455" y="330" width="290" height="190" rx="16" fill="#FAD3E0" stroke="#F0BFD2" stroke-width="5"/>
    <!-- box lid -->
    <rect x="435" y="290" width="330" height="70" rx="14" fill="#FFFFFF" stroke="#F8EFDE" stroke-width="5"/>
    <!-- vertical ribbon -->
    <rect x="578" y="290" width="44" height="230" fill="#FBE7A8"/>
    <!-- horizontal ribbon on lid -->
    <rect x="435" y="312" width="330" height="26" fill="#FBE7A8"/>
    <!-- bow -->
    <g transform="translate(600 290)">
      <path d="M0 0c-10-34-70-34-58 2 8 24 40 18 58-2Z" fill="#FBE7A8" stroke="#F4D77E" stroke-width="3"/>
      <path d="M0 0c10-34 70-34 58 2 -8 24-40 18-58-2Z" fill="#FBE7A8" stroke="#F4D77E" stroke-width="3"/>
      <circle cx="0" cy="2" r="11" fill="#F6C944"/>
    </g>
  </g>

  <!-- stickers peeking out of the box -->
  <g transform="rotate(-12 500 290)">
    <path d="M480 250c-16-15-32 3-16 18l16 15 16-15c16-15 0-33-16-18Z" fill="#FFFFFF" stroke="#F0BFD2" stroke-width="4"/>
    <path d="M480 250c-13-12-26 2-13 14l13 13 13-13c13-12 0-26-13-14Z" fill="#FAD3E0"/>
  </g>
  <g transform="rotate(8 705 270)">
    <circle cx="705" cy="270" r="34" fill="#FFFFFF" stroke="#E7DBC8" stroke-width="4"/>
    <circle cx="705" cy="270" r="27" fill="#DDE9D5"/>
    <circle cx="694" cy="262" r="4" fill="#43382E"/><circle cx="716" cy="262" r="4" fill="#43382E"/>
    <path d="M693 280q12 9 24 0" stroke="#43382E" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
  <g transform="rotate(-6 612 232)">
    <path d="M612 200 l9 22 23 1 -18 15 7 23 -21 -13 -21 13 7 -23 -18 -15 23 -1 Z" fill="#FFFFFF" stroke="#F0E2CC" stroke-width="4"/>
    <path d="M612 208 l6 16 17 1 -13 11 5 17 -15 -10 -15 10 5 -17 -13 -11 17 -1 Z" fill="#FBE7A8"/>
  </g>

  <path d="M150 520 l9 24 24 9 -24 9 -9 24 -9 -24 -24 -9 24 -9 Z" fill="#FBE7A8"/>
</svg>
