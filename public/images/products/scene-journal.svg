<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sticker styled on an open journal">
  <rect width="600" height="600" fill="#FFE3D0"/>
  <!-- open journal -->
  <rect x="80" y="130" width="440" height="340" rx="18" fill="#E8D5BC"/>
  <rect x="95" y="145" width="200" height="310" rx="10" fill="#FFFDF7"/>
  <rect x="305" y="145" width="200" height="310" rx="10" fill="#FFF9EE"/>
  <path d="M300 145v310" stroke="#D9C4A6" stroke-width="6"/>
  <!-- writing lines -->
  <g stroke="#D9CDBE" stroke-width="5" stroke-linecap="round">
    <path d="M115 190h160M115 220h160M115 250h130M115 280h160M115 310h150M115 340h160M115 370h120"/>
    <path d="M325 250h160M325 280h140M325 310h160M325 340h110"/>
